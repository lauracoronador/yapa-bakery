<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 82" width="200" height="82" role="img" aria-label="Yapa Bakery">
  <title>Yapa Bakery</title>

  <!-- Sun rays -->
  <g stroke="#C4662A" stroke-width="2.5" stroke-linecap="round">
    <line x1="121"   y1="18"   x2="127" y2="18"/>
    <line x1="117.8" y1="25.8" x2="122" y2="30"/>
    <line x1="110"   y1="29"   x2="110" y2="35"/>
    <line x1="102.2" y1="25.8" x2="98"  y2="30"/>
    <line x1="99"    y1="18"   x2="93"  y2="18"/>
    <line x1="102.2" y1="10.2" x2="98"  y2="6"/>
    <line x1="110"   y1="7"    x2="110" y2="1"/>
    <line x1="117.8" y1="10.2" x2="122" y2="6"/>
  </g>

  <!-- Sun circle -->
  <circle cx="110" cy="18" r="9" fill="#C4662A"/>

  <!-- YAPA wordmark -->
  <text
    x="110" y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="bold"
    font-size="32"
    fill="#4A2C1A"
    text-anchor="middle"
    letter-spacing="3"
  >YAPA</text>

  <!-- Bakery italic -->
  <text
    x="112" y="78"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="16"
    fill="#7A4A2A"
    text-anchor="middle"
    letter-spacing="2"
  >Bakery</text>
</svg>
